name: Infra Dev

on:
  push:
    branches:
      - dev
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra-dev.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

permissions:
  contents: read

concurrency:
  group: infra-dev
  cancel-in-progress: false

jobs:
  terraform-dev:
    runs-on: ubuntu-latest
    environment: dev
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: 0
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_CLOUD_ORGANIZATION: ${{ secrets.TF_CLOUD_ORGANIZATION }}
      TF_WORKSPACE: gmp-dev
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_CLI_TENANCY }}
      TF_VAR_user_ocid: ${{ secrets.OCI_CLI_USER }}
      TF_VAR_fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
      TF_VAR_region: ${{ secrets.OCI_CLI_REGION }}
      TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID != '' && secrets.OCI_COMPARTMENT_OCID || secrets.OCI_CLI_TENANCY }}
      TF_VAR_private_key_path: ~/.oci/oci_api_key.pem
    steps:
      - uses: actions/checkout@v4

      - name: Validate Terraform Cloud settings
        run: |
          if [ -z "$TF_CLOUD_ORGANIZATION" ] || [ -z "$TF_TOKEN_app_terraform_io" ]; then
            echo "::error::Missing TF_CLOUD_ORGANIZATION or TF_API_TOKEN secrets for remote backend locking"
            exit 1
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Configure OCI key
        env:
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
        run: |
          if [ -z "$OCI_CLI_KEY_CONTENT" ]; then
            echo "::error::Missing OCI_CLI_KEY_CONTENT secret"
            exit 1
          fi
          mkdir -p ~/.oci
          RAW_KEY="${OCI_CLI_KEY_CONTENT}"
          RAW_KEY_STRIPPED=$(printf '%s' "$RAW_KEY" | tr -d '\r')
          if printf '%s' "$RAW_KEY_STRIPPED" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s\n' "$RAW_KEY_STRIPPED" > ~/.oci/oci_api_key.pem
          elif printf '%b' "$RAW_KEY_STRIPPED" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%b' "$RAW_KEY_STRIPPED" > ~/.oci/oci_api_key.pem
          elif printf '%s' "$RAW_KEY_STRIPPED" | base64 -d > ~/.oci/oci_api_key.pem 2>/dev/null; then
            :
          elif printf '%b' "$RAW_KEY_STRIPPED" | base64 -d > ~/.oci/oci_api_key.pem 2>/dev/null; then
            :
          else
            printf '%b' "$RAW_KEY_STRIPPED" > ~/.oci/oci_api_key.pem
          fi
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Terraform init
        run: terraform -chdir=infra/terraform/envs/dev init -reconfigure

      - name: Terraform validate
        run: terraform -chdir=infra/terraform/envs/dev validate

      - name: Terraform plan
        run: terraform -chdir=infra/terraform/envs/dev plan -no-color

      - name: Terraform apply
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply') }}
        run: terraform -chdir=infra/terraform/envs/dev apply -auto-approve

      - name: Terraform destroy
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' }}
        run: terraform -chdir=infra/terraform/envs/dev destroy -auto-approve

      - name: Detect drift after destroy
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' }}
        run: |
          set -euo pipefail
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          bash install.sh --accept-all-defaults
          export PATH="$HOME/bin:$PATH"
          {
            echo "[DEFAULT]"
            echo "user=${TF_VAR_user_ocid}"
            echo "fingerprint=${TF_VAR_fingerprint}"
            echo "tenancy=${TF_VAR_tenancy_ocid}"
            echo "region=${TF_VAR_region}"
            echo "key_file=~/.oci/oci_api_key.pem"
          } > ~/.oci/config
          REMAINING_CLUSTERS=$(oci ce cluster list --compartment-id "$TF_VAR_compartment_ocid" --all --output json | jq -r '.data[] | select(."lifecycle-state"=="ACTIVE" and .name=="gmp-oke-dev") | .id' | wc -l | xargs)
          REMAINING_LBS=$(oci lb load-balancer list --compartment-id "$TF_VAR_compartment_ocid" --all --output json | jq -r '.data[] | select(."lifecycle-state"=="ACTIVE") | .id' | wc -l | xargs)
          if [ "$REMAINING_CLUSTERS" -gt 0 ] || [ "$REMAINING_LBS" -gt 0 ]; then
            echo "::warning::Terraform state drift detected. Active OCI resources still exist."
            echo "::warning::Run Infra Dev Cleanup workflow or: make infra-cleanup-ci"
          fi
