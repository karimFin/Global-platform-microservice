name: Reliability Scorecard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write
  issues: write

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate scorecard markdown
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/reliability-scorecard.sh
          mkdir -p docs/reliability/scorecards
          DATE_UTC=$(date -u +%F)
          scripts/reliability-scorecard.sh "${{ github.repository }}" > "docs/reliability/scorecards/${DATE_UTC}.md"

      - name: Commit scorecard
        run: |
          DATE_UTC=$(date -u +%F)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "docs/reliability/scorecards/${DATE_UTC}.md"
          git commit -m "Add reliability scorecard ${DATE_UTC}" || exit 0
          git push

      - name: Create weekly scorecard issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE_UTC=$(date -u +%F)
          BODY="$(cat docs/reliability/scorecards/${DATE_UTC}.md)"
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Reliability Scorecard ${DATE_UTC}" \
            --body "$BODY" \
            --label "reliability"
