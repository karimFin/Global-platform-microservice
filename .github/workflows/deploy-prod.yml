name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: false
        default: ""
      namespace:
        description: "Kubernetes namespace"
        required: false
        default: "marketplace-prod"
      create_namespace:
        description: "Create namespace if missing"
        required: false
        default: true
        type: boolean
      canary_checks:
        description: "Enable canary checks before promotion"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || '' }}
  DEPLOY_NAMESPACE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.namespace || 'marketplace-prod' }}
  CREATE_NAMESPACE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.create_namespace == 'true' || true }}
  CANARY_CHECKS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.canary_checks == 'true' || true }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/reusable-cicd.yml
    with:
      environment_name: prod
      namespace: ${{ env.DEPLOY_NAMESPACE }}
      overlay: prod
      deploy: true
      build_images: true
      push_images: true
      sign_images: true
      run_tests: false
      run_frontend: false
      validate_k8s: true
      validate_k8s_all: false
      policy_check: true
      canary_checks: ${{ env.CANARY_CHECKS }}
      create_namespace: ${{ env.CREATE_NAMESPACE }}
      ref: ${{ env.DEPLOY_REF }}
    secrets: inherit
