name: Rotate Environment Secret

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub environment (dev/prod)"
        required: true
        type: choice
        options:
          - dev
          - prod
      secret_name:
        description: "Secret key name"
        required: true
        type: string
      secret_value:
        description: "New secret value"
        required: true
        type: string
      repository:
        description: "Owner/repo (defaults to current repo)"
        required: false
        type: string
      dry_run:
        description: "Validate only without updating secret"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target
        id: target
        env:
          INPUT_REPOSITORY: ${{ inputs.repository }}
          CURRENT_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_REPOSITORY" ]; then
            echo "repo=$INPUT_REPOSITORY" >> "$GITHUB_OUTPUT"
          else
            echo "repo=$CURRENT_REPOSITORY" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate policy metadata
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          REPO: ${{ steps.target.outputs.repo }}
          ENV_NAME: ${{ inputs.environment }}
          SECRET_NAME: ${{ inputs.secret_name }}
        run: |
          set -euo pipefail
          REQUIRED=$(gh variable list --repo "$REPO" --env "$ENV_NAME" --json name,value --jq '.[] | select(.name=="REQUIRED_SECRETS") | .value' || true)
          DECLARED=$(gh variable list --repo "$REPO" --env "$ENV_NAME" --json name,value --jq '.[] | select(.name=="DECLARED_SECRETS") | .value' || true)
          if [ -z "$DECLARED" ]; then
            echo "::warning::DECLARED_SECRETS metadata not found for environment '$ENV_NAME'."
          else
            if ! printf ',%s,' "$DECLARED" | grep -q ",$SECRET_NAME,"; then
              echo "::error::Secret '$SECRET_NAME' is not listed in DECLARED_SECRETS for environment '$ENV_NAME'."
              exit 1
            fi
          fi
          if [ -n "$REQUIRED" ]; then
            echo "Required secrets metadata: $REQUIRED"
          fi

      - name: Rotate secret
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          REPO: ${{ steps.target.outputs.repo }}
          ENV_NAME: ${{ inputs.environment }}
          SECRET_NAME: ${{ inputs.secret_name }}
          SECRET_VALUE: ${{ inputs.secret_value }}
        run: |
          set -euo pipefail
          printf '%s' "$SECRET_VALUE" | gh secret set "$SECRET_NAME" --repo "$REPO" --env "$ENV_NAME" --body -

      - name: Summary
        env:
          REPO: ${{ steps.target.outputs.repo }}
        run: |
          {
            echo "## Secret Rotation"
            echo ""
            echo "- Repository: \`$REPO\`"
            echo "- Environment: \`${{ inputs.environment }}\`"
            echo "- Secret: \`${{ inputs.secret_name }}\`"
            echo "- Dry run: \`${{ inputs.dry_run }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
