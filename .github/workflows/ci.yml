name: CI Dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: |
          for svc in api-gateway identity seller catalog search pricing inventory cart checkout payments orders fulfillment notifications reviews analytics; do
            (cd services/$svc && npm ci && npm test)
          done
      - run: npm --prefix frontend install
      - run: npm --prefix frontend run lint
      - run: npm --prefix frontend run format
      - run: npm --prefix frontend run build
