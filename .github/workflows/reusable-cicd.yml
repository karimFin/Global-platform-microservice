name: Reusable CI/CD

on:
  workflow_call:
    secrets:
      GHCR_TOKEN:
        required: false
      KUBE_CONFIG_DEV:
        required: false
      KUBE_CONFIG_PROD:
        required: false
      OCI_CLI_USER:
        required: false
      OCI_CLI_TENANCY:
        required: false
      OCI_CLI_FINGERPRINT:
        required: false
      OCI_CLI_KEY_CONTENT:
        required: false
      OCI_CLI_REGION:
        required: false
    inputs:
      environment_name:
        required: true
        type: string
      namespace:
        required: true
        type: string
      overlay:
        required: true
        type: string
      deploy:
        required: true
        type: boolean
        default: false
      build_images:
        required: true
        type: boolean
        default: false
      push_images:
        required: true
        type: boolean
        default: false
      sign_images:
        required: true
        type: boolean
        default: false
      run_tests:
        required: true
        type: boolean
        default: true
      run_frontend:
        required: true
        type: boolean
        default: true
      validate_k8s:
        required: true
        type: boolean
        default: true
      validate_k8s_all:
        required: true
        type: boolean
        default: false
      policy_check:
        required: true
        type: boolean
        default: false
      canary_checks:
        required: true
        type: boolean
        default: false
      create_namespace:
        required: true
        type: boolean
        default: false
      ref:
        required: false
        type: string
        default: ""
      preview_pr_number:
        required: false
        type: string
        default: ""

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      repo_lower: ${{ steps.meta.outputs.repo_lower }}
    steps:
      - name: Set metadata
        id: meta
        run: |
          SHA_INPUT="${{ inputs.ref }}"
          if [ -z "$SHA_INPUT" ]; then
            SHA_INPUT="${{ github.sha }}"
          fi
          echo "sha=$SHA_INPUT" >> "$GITHUB_OUTPUT"
          echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  lint-test:
    runs-on: ubuntu-latest
    if: ${{ inputs.run_tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Unit tests (matrix)
        run: |
          for svc in api-gateway identity seller catalog search pricing inventory cart checkout payments orders fulfillment notifications reviews analytics; do
            echo "Testing $svc"
            (cd services/$svc && npm ci && npm test)
          done
      - name: Frontend install
        if: ${{ inputs.run_frontend }}
        run: npm --prefix frontend install
      - name: Frontend lint
        if: ${{ inputs.run_frontend }}
        run: npm --prefix frontend run lint
      - name: Frontend format check
        if: ${{ inputs.run_frontend }}
        run: npm --prefix frontend run format
      - name: Frontend build
        if: ${{ inputs.run_frontend }}
        run: npm --prefix frontend run build

  build-scan-push:
    runs-on: ubuntu-latest
    needs: meta
    if: ${{ inputs.build_images }}
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, web, identity, seller, catalog, search, pricing, inventory, cart, checkout, payments, orders, fulfillment, notifications, reviews, analytics]
    steps:
      - uses: actions/checkout@v4
      - name: Set image repo
        run: echo "REPO_LOWER=${{ needs.meta.outputs.repo_lower }}" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        if: ${{ inputs.push_images }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'web' && './frontend' || format('./services/{0}', matrix.service) }}
          push: ${{ inputs.push_images }}
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ needs.meta.outputs.sha }}
          platforms: linux/amd64
      - name: Generate SBOM (Syft)
        if: ${{ inputs.push_images }}
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ needs.meta.outputs.sha }}
          output-file: sbom-${{ matrix.service }}.spdx.json
          format: spdx-json
      - name: Upload SBOM artifact
        if: ${{ inputs.push_images }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json
      - name: Trivy scan
        if: ${{ false }}
        uses: aquasecurity/trivy-action@0.19.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ needs.meta.outputs.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
      - name: Install cosign
        if: ${{ false }}
        uses: sigstore/cosign-installer@v3
      - name: Cosign sign
        if: ${{ false }}
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ needs.meta.outputs.sha }}
      - name: Cosign attest SBOM
        if: ${{ false }}
        run: cosign attest --yes --predicate sbom-${{ matrix.service }}.spdx.json --type spdxjson ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/${{ matrix.service }}:${{ needs.meta.outputs.sha }}

  validate-k8s:
    runs-on: ubuntu-latest
    if: ${{ inputs.validate_k8s && !inputs.validate_k8s_all }}
    steps:
      - uses: actions/checkout@v4
      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.2
      - name: Kustomize build
        run: kustomize build platform/k8s/overlays/${{ inputs.overlay }} > /dev/null

  validate-k8s-all:
    runs-on: ubuntu-latest
    if: ${{ inputs.validate_k8s_all }}
    steps:
      - uses: actions/checkout@v4
      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.2
      - name: Kustomize build (dev)
        run: kustomize build platform/k8s/overlays/dev > /dev/null
      - name: Kustomize build (prod)
        run: kustomize build platform/k8s/overlays/prod > /dev/null

  policy-check:
    runs-on: ubuntu-latest
    if: ${{ inputs.policy_check }}
    steps:
      - uses: actions/checkout@v4
      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.2
      - name: Detect policy dir
        run: |
          POLICY_DIR=""
          for d in policy policies opa gatekeeper kyverno; do
            if [ -d "$d" ]; then
              POLICY_DIR="$d"
              break
            fi
          done
          echo "POLICY_DIR=$POLICY_DIR" >> "$GITHUB_ENV"
      - name: Install conftest
        if: ${{ env.POLICY_DIR != '' }}
        run: |
          curl -L -o conftest.tar.gz https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar -xzf conftest.tar.gz conftest
          chmod +x conftest
      - name: Policy check overlays
        if: ${{ env.POLICY_DIR != '' && inputs.validate_k8s_all }}
        run: |
          kustomize build platform/k8s/overlays/dev > /tmp/kustomize-dev.yaml
          ./conftest test /tmp/kustomize-dev.yaml -p "${POLICY_DIR}"
          kustomize build platform/k8s/overlays/prod > /tmp/kustomize-prod.yaml
          ./conftest test /tmp/kustomize-prod.yaml -p "${POLICY_DIR}"
      - name: Policy check overlay
        if: ${{ env.POLICY_DIR != '' && !inputs.validate_k8s_all }}
        run: |
          kustomize build platform/k8s/overlays/${{ inputs.overlay }} > /tmp/kustomize.yaml
          ./conftest test /tmp/kustomize.yaml -p "${POLICY_DIR}"

  # ─────────────────────────────────────────────────────────────
  #  DEV DEPLOYMENT (OKE via OCI CLI exec-based auth)
  # ─────────────────────────────────────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    needs: [meta, build-scan-push, validate-k8s, policy-check]
    if: ${{ inputs.deploy && inputs.environment_name == 'dev' }}
    environment: dev
    steps:
      - uses: actions/checkout@v4

      # ── OCI CLI (required for exec-based kubeconfig token generation) ──
      - name: Install OCI CLI
        run: |
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          bash install.sh --accept-all-defaults
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Configure OCI CLI
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
        run: |
          for v in OCI_CLI_USER OCI_CLI_TENANCY OCI_CLI_FINGERPRINT OCI_CLI_KEY_CONTENT OCI_CLI_REGION; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              exit 1
            fi
          done

          mkdir -p ~/.oci
          SAN_USER=$(printf '%s' "${OCI_CLI_USER}" | tr -d '\r' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/^"(.*)"$/\1/')
          SAN_TENANCY=$(printf '%s' "${OCI_CLI_TENANCY}" | tr -d '\r' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/^"(.*)"$/\1/')
          SAN_FINGERPRINT=$(printf '%s' "${OCI_CLI_FINGERPRINT}" | tr -d '\r' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/^"(.*)"$/\1/')
          SAN_REGION=$(printf '%s' "${OCI_CLI_REGION}" | tr -d '\r' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/^"(.*)"$/\1/')
          {
            echo "[DEFAULT]"
            echo "user=${SAN_USER}"
            echo "fingerprint=${SAN_FINGERPRINT}"
            echo "tenancy=${SAN_TENANCY}"
            echo "region=${SAN_REGION}"
            echo "key_file=~/.oci/oci_api_key.pem"
          } > ~/.oci/config

          KEY_FILE=~/.oci/oci_api_key.pem
          RAW_KEY="${OCI_CLI_KEY_CONTENT}"
          RAW_KEY_STRIPPED=$(printf '%s' "$RAW_KEY" | tr -d '\r')
          if printf '%s' "$RAW_KEY_STRIPPED" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s\n' "$RAW_KEY_STRIPPED" > "$KEY_FILE"
          elif printf '%b' "$RAW_KEY_STRIPPED" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%b' "$RAW_KEY_STRIPPED" > "$KEY_FILE"
          elif printf '%s' "$RAW_KEY_STRIPPED" | base64 -d > "$KEY_FILE" 2>/dev/null; then
            :
          elif printf '%b' "$RAW_KEY_STRIPPED" | base64 -d > "$KEY_FILE" 2>/dev/null; then
            :
          else
            printf '%b' "$RAW_KEY_STRIPPED" > "$KEY_FILE"
          fi
          if ! grep -Eq "BEGIN (RSA |EC |OPENSSH |ENCRYPTED |)?PRIVATE KEY" "$KEY_FILE"; then
            echo "::warning::OCI_CLI_KEY_CONTENT format is unusual; validating with OCI CLI"
          fi

          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem
          oci --version
          oci iam region-subscription list --tenancy-id "${SAN_TENANCY}" --all > /dev/null

      # ── Kubeconfig ──
      - name: Ensure dev kubeconfig secret exists
        env:
          KUBE_CONFIG_DEV: ${{ secrets.KUBE_CONFIG_DEV }}
        run: |
          if [ -z "$KUBE_CONFIG_DEV" ]; then
            echo "::warning::KUBE_CONFIG_DEV secret is not set; kubeconfig will be generated from OCI"
          fi

      - name: Set image repo
        run: echo "REPO_LOWER=${{ needs.meta.outputs.repo_lower }}" >> $GITHUB_ENV

      - name: Install kubectl & kustomize
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.2'
      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.2

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          CONFIG_FILE=$HOME/.kube/config
          RAW_FILE=$HOME/.kube/config.raw
          DECODED_FILE=$HOME/.kube/config.dec

          ensure_kubeconfig_from_oci() {
            CLUSTER_OCID=$(oci ce cluster list --compartment-id "${OCI_CLI_TENANCY}" --all --query 'data[?name==`gmp-oke-dev` && "lifecycle-state"==`ACTIVE`] | [-1].id' --raw-output 2>/dev/null || true)
            if [ -z "$CLUSTER_OCID" ] || [ "$CLUSTER_OCID" = "null" ]; then
              echo "::error::No ACTIVE gmp-oke-dev cluster found in tenancy"
              exit 1
            fi
            oci ce cluster create-kubeconfig --cluster-id "$CLUSTER_OCID" --file "$CONFIG_FILE" --region "${OCI_CLI_REGION}" --token-version 2.0.0 --kube-endpoint PUBLIC_ENDPOINT
          }

          KCFG_OK=false
          if [ -n "${KUBE_CONFIG_DEV}" ]; then
            printf '%s' "${KUBE_CONFIG_DEV}" > "$RAW_FILE"
            if grep -q "apiVersion:" "$RAW_FILE"; then
              cp "$RAW_FILE" "$CONFIG_FILE"
            else
              base64 -d "$RAW_FILE" > "$DECODED_FILE" 2>/dev/null || true
              if grep -q "apiVersion:" "$DECODED_FILE"; then
                cp "$DECODED_FILE" "$CONFIG_FILE"
              else
                base64 -d "$DECODED_FILE" > "$CONFIG_FILE" 2>/dev/null || true
              fi
            fi
            if grep -q "apiVersion:" "$CONFIG_FILE" 2>/dev/null; then
              KCFG_OK=true
            fi
          fi

          if [ "$KCFG_OK" = false ]; then
            ensure_kubeconfig_from_oci
          fi

          chmod 600 "$CONFIG_FILE"
          echo "KUBECONFIG=$CONFIG_FILE" >> $GITHUB_ENV

          CTX=$(kubectl config current-context 2>/dev/null || true)
          if [ -z "$CTX" ]; then
            ensure_kubeconfig_from_oci
            CTX=$(kubectl config current-context 2>/dev/null || true)
          fi
          if [ -z "$CTX" ]; then
            echo "::error::Kubeconfig has no current-context set"
            exit 1
          fi
          echo "Current context: $CTX"

          CLUSTER=$(kubectl config view --minify -o jsonpath='{.contexts[0].context.cluster}' 2>/dev/null || true)
          if [ -z "$CLUSTER" ]; then
            ensure_kubeconfig_from_oci
            CLUSTER=$(kubectl config view --minify -o jsonpath='{.contexts[0].context.cluster}' 2>/dev/null || true)
          fi
          if [ -z "$CLUSTER" ]; then
            echo "::error::Context '$CTX' has no cluster assigned"
            exit 1
          fi
          echo "Cluster: $CLUSTER"

          SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null | tr -d '`' | xargs || true)
          case "$SERVER" in
            ""|http://localhost:8080|http://127.0.0.1:8080|http://[::1]:8080|https://localhost:*|https://127.0.0.1:*|https://[::1]:*)
              ensure_kubeconfig_from_oci
              SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null | tr -d '`' | xargs || true)
              ;;
          esac
          case "$SERVER" in
            ""|http://localhost:8080|http://127.0.0.1:8080|http://[::1]:8080|https://localhost:*|https://127.0.0.1:*|https://[::1]:*)
              echo "::error::Cluster '$CLUSTER' has invalid server after OCI kubeconfig generation: '${SERVER:-<empty>}'"
              exit 1
              ;;
          esac
          kubectl config set-cluster "$CLUSTER" --server="$SERVER" >/dev/null
          echo "Server: $SERVER"

          USER=$(kubectl config view --minify -o jsonpath='{.contexts[0].context.user}' 2>/dev/null || true)
          if [ -z "$USER" ]; then
            ensure_kubeconfig_from_oci
            USER=$(kubectl config view --minify -o jsonpath='{.contexts[0].context.user}' 2>/dev/null || true)
          fi
          if [ -z "$USER" ]; then
            echo "::error::Context '$CTX' has no user assigned"
            exit 1
          fi
          echo "User: $USER"

          echo "Testing cluster connectivity..."
          if ! kubectl --request-timeout=20s cluster-info; then
            ensure_kubeconfig_from_oci
            kubectl --request-timeout=20s cluster-info
          fi
        env:
          KUBE_CONFIG_DEV: ${{ secrets.KUBE_CONFIG_DEV }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}

      - name: Create namespace
        if: ${{ inputs.create_namespace }}
        run: kubectl get namespace ${{ inputs.namespace }} || kubectl create namespace ${{ inputs.namespace }}

      - name: Label preview namespace TTL
        if: ${{ inputs.preview_pr_number != '' }}
        run: |
          NOW=$(date +%s)
          kubectl label namespace ${{ inputs.namespace }} \
            preview.gmp/enabled=true \
            preview.gmp/pr=${{ inputs.preview_pr_number }} \
            preview.gmp/created-at="$NOW" \
            preview.gmp/ttl-hours=24 \
            --overwrite=true

      - name: Configure GHCR pull secret
        env:
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          if [ -z "$GHCR_PASSWORD" ]; then
            echo "::error::GHCR_TOKEN is required to pull private images from ghcr.io"
            exit 1
          fi
          kubectl create secret docker-registry ghcr-creds \
            -n ${{ inputs.namespace }} \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_USERNAME" \
            --docker-password="$GHCR_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default -n ${{ inputs.namespace }} -p '{"imagePullSecrets":[{"name":"ghcr-creds"}]}'

      - name: Prepare kustomize images
        run: |
          cd platform/k8s/overlays/${{ inputs.overlay }}
          for img in api-gateway web identity seller catalog search pricing inventory cart checkout payments orders fulfillment notifications reviews analytics; do
            kustomize edit set image $img=${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/$img:${{ needs.meta.outputs.sha }}
          done

      - name: Apply dev overlay
        run: kubectl apply -k platform/k8s/overlays/${{ inputs.overlay }}

      - name: Show external services
        run: |
          kubectl get svc web api-gateway -n ${{ inputs.namespace }} -o wide || true
          echo "--- Web LB IP ---"
          kubectl get svc web -n ${{ inputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}{"\n"}' || true
          echo "--- API Gateway LB IP ---"
          kubectl get svc api-gateway -n ${{ inputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}{"\n"}' || true

      - name: Publish dev endpoint summary
        if: ${{ inputs.environment_name == 'dev' }}
        run: |
          WEB_IP=$(kubectl get svc web -n ${{ inputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          API_IP=$(kubectl get svc api-gateway -n ${{ inputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          WEB_URL=""
          API_URL=""
          if [ -n "$WEB_IP" ]; then WEB_URL="http://$WEB_IP"; fi
          if [ -n "$API_IP" ]; then API_URL="http://$API_IP"; fi
          {
            echo "## Dev Deployment Endpoints"
            echo ""
            echo "- Namespace: \`${{ inputs.namespace }}\`"
            echo "- Web IP: \`${WEB_IP:-pending}\`"
            echo "- API Gateway IP: \`${API_IP:-pending}\`"
            if [ -n "$WEB_URL" ]; then echo "- Web URL: $WEB_URL"; fi
            if [ -n "$API_URL" ]; then echo "- API URL: $API_URL"; fi
            echo ""
            echo "If IP is pending, wait 1-3 minutes and re-check service status."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URLs on PR
        if: ${{ inputs.environment_name == 'dev' && inputs.preview_pr_number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WEB_IP=$(kubectl get svc web -n ${{ inputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          API_IP=$(kubectl get svc api-gateway -n ${{ inputs.namespace }} -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          WEB_URL="pending"
          API_URL="pending"
          if [ -n "$WEB_IP" ]; then WEB_URL="http://$WEB_IP"; fi
          if [ -n "$API_IP" ]; then API_URL="http://$API_IP"; fi
          MARKER="<!-- gmp-preview-${{ inputs.preview_pr_number }} -->"
          BODY="$MARKER
          ✅ Preview environment deployed

          - Namespace: \`${{ inputs.namespace }}\`
          - Web: $WEB_URL
          - API Gateway: $API_URL

          If URL is pending, wait a few minutes and re-run deployment."

          EXISTING_ID=$(gh api repos/${{ github.repository }}/issues/${{ inputs.preview_pr_number }}/comments --paginate --jq '.[] | select(.body | contains("'"$MARKER"'")) | .id' | head -n 1 || true)
          if [ -n "$EXISTING_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$EXISTING_ID -X PATCH -f body="$BODY" >/dev/null
          else
            gh api repos/${{ github.repository }}/issues/${{ inputs.preview_pr_number }}/comments -X POST -f body="$BODY" >/dev/null
          fi

      - name: Wait for rollouts
        run: |
          for d in api-gateway web identity seller catalog search pricing inventory cart checkout payments orders fulfillment notifications reviews analytics; do
            kubectl rollout status deployment/$d -n ${{ inputs.namespace }} --timeout=180s || exit 1
          done

  # ─────────────────────────────────────────────────────────────
  #  PROD CANARY DEPLOYMENT
  # ─────────────────────────────────────────────────────────────
  canary-prod:
    runs-on: ubuntu-latest
    needs: [meta, build-scan-push, validate-k8s, policy-check]
    if: ${{ inputs.deploy && inputs.environment_name == 'prod' }}
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Install OCI CLI
        run: |
          curl -L -O https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh
          bash install.sh --accept-all-defaults
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Configure OCI CLI
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
        run: |
          for v in OCI_CLI_USER OCI_CLI_TENANCY OCI_CLI_FINGERPRINT OCI_CLI_KEY_CONTENT OCI_CLI_REGION; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing required secret: $v"
              exit 1
            fi
          done

          mkdir -p ~/.oci
          SAN_USER=$(printf '%s' "${OCI_CLI_USER}" | tr -d '\r' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/^"(.*)"$/\1/')
          SAN_TENANCY=$(printf '%s' "${OCI_CLI_TENANCY}" | tr -d '\r' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/^"(.*)"$/\1/')
          SAN_FINGERPRINT=$(printf '%s' "${OCI_CLI_FINGERPRINT}" | tr -d '\r' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/^"(.*)"$/\1/')
          SAN_REGION=$(printf '%s' "${OCI_CLI_REGION}" | tr -d '\r' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/^"(.*)"$/\1/')
          {
            echo "[DEFAULT]"
            echo "user=${SAN_USER}"
            echo "fingerprint=${SAN_FINGERPRINT}"
            echo "tenancy=${SAN_TENANCY}"
            echo "region=${SAN_REGION}"
            echo "key_file=~/.oci/oci_api_key.pem"
          } > ~/.oci/config

          KEY_FILE=~/.oci/oci_api_key.pem
          RAW_KEY="${OCI_CLI_KEY_CONTENT}"
          RAW_KEY_STRIPPED=$(printf '%s' "$RAW_KEY" | tr -d '\r')
          if printf '%s' "$RAW_KEY_STRIPPED" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%s\n' "$RAW_KEY_STRIPPED" > "$KEY_FILE"
          elif printf '%b' "$RAW_KEY_STRIPPED" | grep -q "BEGIN .*PRIVATE KEY"; then
            printf '%b' "$RAW_KEY_STRIPPED" > "$KEY_FILE"
          elif printf '%s' "$RAW_KEY_STRIPPED" | base64 -d > "$KEY_FILE" 2>/dev/null; then
            :
          elif printf '%b' "$RAW_KEY_STRIPPED" | base64 -d > "$KEY_FILE" 2>/dev/null; then
            :
          else
            printf '%b' "$RAW_KEY_STRIPPED" > "$KEY_FILE"
          fi
          if ! grep -Eq "BEGIN (RSA |EC |OPENSSH |ENCRYPTED |)?PRIVATE KEY" "$KEY_FILE"; then
            echo "::warning::OCI_CLI_KEY_CONTENT format is unusual; validating with OCI CLI"
          fi

          chmod 600 ~/.oci/config ~/.oci/oci_api_key.pem
          oci --version
          oci iam region-subscription list --tenancy-id "${SAN_TENANCY}" --all > /dev/null

      - name: Ensure prod kubeconfig
        env:
          KUBE_CONFIG_PROD: ${{ secrets.KUBE_CONFIG_PROD }}
        run: |
          if [ -z "$KUBE_CONFIG_PROD" ]; then
            echo "::error::KUBE_CONFIG_PROD secret is not set"
            exit 1
          fi

      - name: Set image repo
        run: echo "REPO_LOWER=${{ needs.meta.outputs.repo_lower }}" >> $GITHUB_ENV

      - name: Install kubectl & kustomize
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.2'
      - uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.4.2

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          CONFIG_FILE=$HOME/.kube/config
          RAW_FILE=$HOME/.kube/config.raw
          DECODED_FILE=$HOME/.kube/config.dec

          printf '%s' "${KUBE_CONFIG_PROD}" > "$RAW_FILE"

          if grep -q "apiVersion:" "$RAW_FILE"; then
            cp "$RAW_FILE" "$CONFIG_FILE"
          else
            base64 -d "$RAW_FILE" > "$DECODED_FILE" 2>/dev/null || true
            if grep -q "apiVersion:" "$DECODED_FILE"; then
              cp "$DECODED_FILE" "$CONFIG_FILE"
            else
              base64 -d "$DECODED_FILE" > "$CONFIG_FILE" 2>/dev/null || true
              if ! grep -q "apiVersion:" "$CONFIG_FILE"; then
                echo "::error::KUBE_CONFIG_PROD could not be decoded to valid kubeconfig YAML"
                exit 1
              fi
            fi
          fi

          chmod 600 "$CONFIG_FILE"
          echo "KUBECONFIG=$CONFIG_FILE" >> $GITHUB_ENV

          CTX=$(kubectl config current-context 2>/dev/null || true)
          if [ -z "$CTX" ]; then
            echo "::error::KUBE_CONFIG_PROD has no current-context set"
            kubectl config get-contexts --no-headers 2>/dev/null || true
            exit 1
          fi

          CLUSTER=$(kubectl config view --minify -o jsonpath='{.contexts[0].context.cluster}' 2>/dev/null || true)
          if [ -z "$CLUSTER" ]; then
            echo "::error::Context '$CTX' has no cluster assigned"
            kubectl config get-contexts --no-headers 2>/dev/null || true
            exit 1
          fi

          SERVER=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null || true)
          case "$SERVER" in
            ""|http://localhost:8080|http://127.0.0.1:8080|http://[::1]:8080|https://localhost:*|https://127.0.0.1:*|https://[::1]:*)
              echo "::error::Cluster '$CLUSTER' has invalid server: '${SERVER:-<empty>}'"
              exit 1
              ;;
          esac

          USER=$(kubectl config view --minify -o jsonpath='{.contexts[0].context.user}' 2>/dev/null || true)
          if [ -z "$USER" ]; then
            echo "::error::Context '$CTX' has no user assigned"
            exit 1
          fi

          kubectl cluster-info
        env:
          KUBE_CONFIG_PROD: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Create namespace
        if: ${{ inputs.create_namespace }}
        run: kubectl get namespace ${{ inputs.namespace }} || kubectl create namespace ${{ inputs.namespace }}

      - name: Configure GHCR pull secret
        env:
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          if [ -z "$GHCR_PASSWORD" ]; then
            echo "::error::GHCR_TOKEN is required to pull private images from ghcr.io"
            exit 1
          fi
          kubectl create secret docker-registry ghcr-creds \
            -n ${{ inputs.namespace }} \
