            --docker-username="$GHCR_USERNAME" \
            --docker-password="$GHCR_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default -n ${{ inputs.namespace }} -p '{"imagePullSecrets":[{"name":"ghcr-creds"}]}'

      - name: Canary on api-gateway
        run: |
          cd platform/k8s/overlays/${{ inputs.overlay }}
          kustomize edit set image api-gateway=${{ env.REGISTRY }}/${{ env.REPO_LOWER }}/api-gateway:${{ needs.meta.outputs.sha }}
          kubectl apply -k .
          set +e
          kubectl rollout status deployment/api-gateway -n ${{ inputs.namespace }} --timeout=180s
          RC=$?
          if [ $RC -ne 0 ]; then
            kubectl rollout undo deployment/api-gateway -n ${{ inputs.namespace }}
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
