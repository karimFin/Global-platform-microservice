name: Deploy

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      ref:
        description: "Git ref to deploy"
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/reusable-cicd.yml
    with:
      environment_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || 'dev' }}
      namespace: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod') && 'marketplace-prod' || 'marketplace-dev' }}
      overlay: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod') && 'prod' || 'dev' }}
      deploy: true
      build_images: true
      push_images: true
      sign_images: true
      run_tests: false
      run_frontend: false
      validate_k8s: true
      validate_k8s_all: false
      policy_check: true
      canary_checks: true
      create_namespace: true
      ref: ${{ github.event.inputs.ref }}
    secrets: inherit
