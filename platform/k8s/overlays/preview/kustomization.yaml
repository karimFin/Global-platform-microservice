apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../dev

secretGenerator:
  - name: postgres-credentials
    literals:
      - username=market
      - password=marketpass
  - name: minio-credentials
    literals:
      - accesskey=admin
      - secretkey=adminadmin

generatorOptions:
  disableNameSuffixHash: true

patches:
  - patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: web
      spec:
        type: ClusterIP
